
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickWin × Samuel Haas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'pickwin-green': '#13D482',
              'pickwin-bg': '#000000',
              'pickwin-surface': '#0A0A0A',
              'pickwin-card': '#141414',
              'pickwin-gold': '#FBC02D',
              'cosmic-purple': '#8B5CF6',
              'cosmic-blue': '#3B82F6',
              'outlaw-dark': '#000000',
              'purple-pink': '#E879F9',
              'pink-purple': '#D946EF',
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #FFFFFF;
            overflow-x: hidden;
        }
        .bg-pickwin-green { background-color: #13D482; }
        .text-pickwin-green { color: #13D482; }
        .border-pickwin-green { border-color: #13D482; }
        .glow-green { box-shadow: 0 0 20px rgba(19, 212, 130, 0.3); }
        .glow-cosmic { box-shadow: 0 0 30px rgba(139, 92, 246, 0.4), 0 0 60px rgba(59, 130, 246, 0.2); }
        .glow-purple-pink { box-shadow: 0 0 20px rgba(232, 121, 249, 0.5), 0 0 40px rgba(217, 70, 239, 0.3); }
        .text-glow-purple-pink { 
            text-shadow: 0 0 10px rgba(232, 121, 249, 0.6), 0 0 20px rgba(217, 70, 239, 0.4), 0 0 30px rgba(232, 121, 249, 0.3);
        }
        .glass { background: rgba(46, 49, 54, 0.6); backdrop-filter: blur(10px); }
        @keyframes cosmicPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .animate-cosmic-pulse { animation: cosmicPulse 4s ease-in-out infinite; }
        /* Outlaw/Western decorative patterns */
        .bandana-pattern {
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.1) 2px, rgba(255,255,255,0.1) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.1) 2px, rgba(255,255,255,0.1) 4px);
        }
        .wanted-badge {
            position: relative;
        }
        .wanted-badge::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            transform: rotate(-2deg);
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes greenFlash {
            0%, 100% { background-color: rgba(19, 212, 130, 0.1); border-color: rgba(19, 212, 130, 0.3); }
            50% { background-color: rgba(19, 212, 130, 0.3); border-color: rgba(19, 212, 130, 0.6); box-shadow: 0 0 15px rgba(19, 212, 130, 0.4); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-green-flash { animation: greenFlash 2s ease-in-out infinite; }
        @keyframes slideInFromLeft {
            from {
                opacity: 0;
                transform: translateX(-80px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes slideInFromRight {
            from {
                opacity: 0;
                transform: translateX(80px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes scaleUp {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .animate-slide-in {
            animation: slideInFromLeft 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-fill-mode: both;
        }
        .animate-slide-in-right {
            animation: slideInFromRight 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-fill-mode: both;
        }
        .animate-scale-up {
            animation: scaleUp 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-fill-mode: both;
        }
        @keyframes slideInFromLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes slideUpFromBottom {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-slide-in-left {
            animation: slideInFromLeft 0.8s ease-out forwards;
        }
        .animate-slide-up {
            animation: slideUpFromBottom 0.8s ease-out forwards;
        }
        html { scroll-behavior: smooth; }

        /* Scroll reveal animations */
        .reveal-fade-up {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }
        .reveal-fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-stagger-1 { transition-delay: 0.1s; }
        .reveal-stagger-2 { transition-delay: 0.2s; }
        .reveal-stagger-3 { transition-delay: 0.3s; }
        .reveal-stagger-4 { transition-delay: 0.4s; }
        .reveal-stagger-5 { transition-delay: 0.5s; }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>

</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
